services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      target: prod
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=["http://localhost:5173"]
    ports:
      - "8000:8000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  redis-data:
